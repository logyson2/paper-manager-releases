# 이 파일은 *공개* 릴리스 레포(logyson2/paper-manager-releases)의
#   .github/workflows/release.yml
# 로 복사해 넣으세요. (이 위치는 보관용 사본입니다.)
#
# 동작: 비공개 소스(logyson2/moonpage)를 PAT 로 체크아웃해 앱을 빌드·서명하고,
#       *이* 공개 레포의 Release 로 발행한다. latest.json 의 다운로드 URL 이
#       공개 레포를 가리키므로, 설치된 앱이 인증 없이 자동 업데이트한다.
#
# 트리거: Actions 탭 → "Run workflow" (수동). 입력 2개.
#
# 필요한 Secrets (이 공개 레포 Settings → Secrets and variables → Actions):
#   - SOURCE_REPO_TOKEN                  : logyson2/moonpage 읽기 PAT (contents:read)
#   - TAURI_SIGNING_PRIVATE_KEY          : 서명 개인키 파일(~/paper-manager.key) 내용 전체
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD : 그 비밀번호(없으면 빈 값)

name: release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "비공개 소스에서 빌드할 ref (태그/브랜치, 예: main)"
        required: true
        default: "main"
      version:
        description: "이 공개 레포에 만들 릴리스 태그 (예: v0.0.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: logyson2/moonpage
          ref: ${{ github.event.inputs.source_ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/widgets/paper-manager/src-tauri

      - name: Install JS deps
        working-directory: source/widgets/paper-manager
        run: npm install

      - name: Generate icons
        working-directory: source/widgets/paper-manager
        run: npm run tauri icon src-tauri/icons/source.png

      # 앱 버전을 릴리스 태그(v0.1.5 → 0.1.5)로 맞춘다.
      # tauri.conf.json 의 version 이 latest.json 의 version 으로 들어가고,
      # 업데이터는 이 값으로 신/구를 비교한다. 태그만 올리고 이 값을 안 올리면
      # 빌드는 되지만 "이미 최신"으로 판단해 영영 업데이트가 안 된다.
      - name: Sync app version to release tag
        working-directory: source/widgets/paper-manager
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}".TrimStart('v')
          $conf = "src-tauri/tauri.conf.json"
          $repl = '${1}' + $v + '${2}'
          (Get-Content $conf -Raw) -replace '("version"\s*:\s*")[^"]+(")', $repl | Set-Content $conf -NoNewline
          $check = (Get-Content $conf -Raw | ConvertFrom-Json).version
          if ($check -ne $v) { Write-Error "버전 동기화 실패: $check (기대값 $v)"; exit 1 }
          Write-Host "앱 버전 = $check"

      - name: Build + sign + release (이 공개 레포에 발행)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: source/widgets/paper-manager
          tagName: ${{ github.event.inputs.version }}
          releaseName: "논문 라이브러리 ${{ github.event.inputs.version }}"
          releaseBody: "자동 빌드된 릴리스입니다. 설치된 앱은 다음 실행 시 자동 업데이트됩니다."
          releaseDraft: false
          prerelease: false
